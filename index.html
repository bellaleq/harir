<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به حریر</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#4c1d95,#6d28d9,#8b5cf6);
    position:relative;
}

body::before,
body::after{
    content:"";
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

body::before{
    width:450px;
    height:450px;
    top:-150px;
    right:-100px;
}

body::after{
    width:350px;
    height:350px;
    bottom:-120px;
    left:-80px;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
}

.logo{
    color:#fff;
    font-size:72px;
    font-weight:bold;
    letter-spacing:6px;
    margin-bottom:35px;
    text-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.enter-btn{
    display:inline-block;
    text-decoration:none;
    background:rgba(255,255,255,0.95);
    color:#6d28d9;
    padding:22px 70px;
    border-radius:100px;
    font-size:24px;
    font-weight:bold;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    transition:all .35s ease;
}

.enter-btn:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

.subtitle{
    margin-top:25px;
    color:#fff;
    font-size:15px;
    opacity:.9;
    letter-spacing:2px;
}

@media(max-width:768px){
    .logo{
        font-size:50px;
    }

    .enter-btn{
        padding:18px 45px;
        font-size:20px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">HARIR</div>

    <a href="https://app-amxnw7dzod8h.appmedo.com/" class="enter-btn">
        ✦ ورود به حریر
    </a>

    <div class="subtitle">
        HARIR DIGITAL PLATFORM
    </div>

</div>

</body>
</html>
